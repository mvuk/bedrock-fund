<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedrock Fund - Portfolio Analyzer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  /* -- Y2K Corporate palette -- */
  :root {
    --slate:      #3b5171;
    --slate-dk:   #2a3c55;
    --slate-lt:   #5a7a9e;
    --silver:     #c8ced6;
    --silver-lt:  #dfe3e9;
    --panel:      #eef1f5;
    --panel-dk:   #d8dde5;
    --cream:      #f4f5f8;
    --text:       #1c2833;
    --text-lt:    #4a5568;
    --accent:     #3465a4;
    --accent-dk:  #264a7a;
    --green:      #2e7d32;
    --red:        #b71c1c;
    --gold:       #8b7b2a;
  }

  body {
    background: var(--cream);
    font-family: Tahoma, Verdana, "Segoe UI", Geneva, sans-serif;
    font-size: 15px;
    color: var(--text);
    margin: 0;
    line-height: 1.5;
  }

  /* -- Header bar -- */
  .site-header {
    background: linear-gradient(180deg, #5a7a9e 0%, #3b5171 40%, #2a3c55 100%);
    border-bottom: 2px solid #1e2d40;
    padding: 0;
  }
  .site-header .inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 12px 20px;
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .site-header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
    letter-spacing: 0.3px;
  }
  .site-header .tagline {
    font-size: 13px;
    color: var(--silver);
    letter-spacing: 0.2px;
  }
  .header-accent {
    height: 3px;
    background: linear-gradient(90deg, var(--silver) 0%, #fff 50%, var(--silver) 100%);
  }

  /* -- Main container -- */
  .main-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 18px 20px 40px;
  }

  /* -- Panels -- */
  .panel {
    background: #fff;
    border: 1px solid var(--silver);
    border-radius: 3px;
    margin-bottom: 18px;
    box-shadow: 1px 1px 3px rgba(0,0,0,0.06);
  }
  .panel-head {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-dk) 100%);
    border-bottom: 1px solid var(--silver);
    padding: 7px 14px;
    font-size: 15px;
    font-weight: 700;
    color: var(--slate-dk);
    letter-spacing: 0.2px;
  }
  .panel-body { padding: 14px; }

  /* -- Tables -- */
  .tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .tbl th {
    background: linear-gradient(180deg, #e2e6ec 0%, #cdd3dc 100%);
    border: 1px solid #a8b0bb;
    padding: 5px 10px;
    font-weight: 700;
    font-size: 13px;
    color: var(--slate-dk);
    text-align: center;
    white-space: nowrap;
  }
  .tbl td {
    border: 1px solid #c8ced6;
    padding: 4px 10px;
    text-align: right;
    background: #fff;
  }
  .tbl td:first-child, .tbl th:first-child { text-align: left; }
  .tbl tr:nth-child(even) td { background: #f6f7fa; }
  .tbl tr:hover td { background: #e8edf4; }

  .pos { color: var(--green); }
  .neg { color: var(--red); }

  /* -- Buttons -- */
  .btn-corp {
    display: inline-block;
    background: linear-gradient(180deg, #6a8dba 0%, #3b5171 100%);
    color: #fff;
    border: 1px solid #2a3c55;
    border-radius: 2px;
    padding: 7px 20px;
    font-family: Tahoma, Verdana, sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    text-shadow: 0 1px 1px rgba(0,0,0,0.3);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 1px 2px rgba(0,0,0,0.15);
  }
  .btn-corp:hover {
    background: linear-gradient(180deg, #7ea0cc 0%, #4a6385 100%);
    color: #fff;
    text-decoration: none;
  }
  .btn-corp:active {
    background: linear-gradient(180deg, #3b5171 0%, #6a8dba 100%);
    box-shadow: inset 0 2px 3px rgba(0,0,0,0.2);
  }
  .btn-corp-sm { padding: 4px 12px; font-size: 13px; }
  .btn-corp-lg { padding: 10px 34px; font-size: 16px; }
  .btn-corp-outline {
    background: linear-gradient(180deg, #fff 0%, var(--panel) 100%);
    color: var(--slate);
    border: 1px solid var(--silver);
    text-shadow: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 1px rgba(0,0,0,0.08);
  }
  .btn-corp-outline:hover {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-dk) 100%);
    color: var(--slate-dk);
  }
  .btn-corp-danger {
    background: linear-gradient(180deg, #d47070 0%, #9e3030 100%);
    border-color: #7a2020;
  }
  .btn-corp-danger:hover {
    background: linear-gradient(180deg, #e08080 0%, #b04040 100%);
  }

  /* -- Form inputs -- */
  .input-corp {
    border: 1px solid var(--silver);
    border-radius: 2px;
    padding: 5px 10px;
    font-family: Tahoma, Verdana, sans-serif;
    font-size: 14px;
    background: #fff;
    color: var(--text);
    box-shadow: inset 1px 1px 2px rgba(0,0,0,0.06);
  }
  .input-corp:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: inset 1px 1px 2px rgba(0,0,0,0.06), 0 0 3px rgba(52,101,164,0.3);
  }

  /* -- Labels and hints -- */
  .lbl { font-size: 13px; font-weight: 700; color: var(--slate-dk); margin-bottom: 3px; display: block; }
  .hint { font-size: 12px; color: var(--text-lt); margin-bottom: 5px; }
  .note { font-size: 12px; color: #888; margin-top: 12px; }

  /* -- Links -- */
  a { color: var(--accent); }
  a:hover { color: var(--accent-dk); }

  /* -- Graph image -- */
  img.graph {
    width: 100%;
    border: 1px solid var(--silver);
    border-radius: 2px;
  }

  /* -- Error box -- */
  .error-box {
    background: #fdf0f0;
    border: 1px solid #d4a0a0;
    color: #6e2020;
    padding: 14px 16px;
    border-radius: 2px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  .error-box strong { display: block; margin-bottom: 4px; font-size: 14px; }

  /* -- Tabs -- */
  .nav-tabs {
    border-bottom: 2px solid var(--slate);
  }
  .nav-tabs .nav-link {
    font-family: Tahoma, Verdana, sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    color: var(--text-lt);
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-dk) 100%);
    border: 1px solid var(--silver);
    border-bottom: none;
    border-radius: 3px 3px 0 0;
    margin-right: 1px;
    margin-bottom: -2px;
  }
  .nav-tabs .nav-link:hover {
    background: linear-gradient(180deg, #fff 0%, var(--panel) 100%);
    color: var(--slate-dk);
  }
  .nav-tabs .nav-link.active {
    background: #fff;
    color: var(--slate-dk);
    font-weight: 700;
    border-color: var(--slate);
    border-bottom: 2px solid #fff;
  }

  /* -- Sheet data viewer -- */
  .sheet-wrap {
    max-height: 400px;
    overflow: auto;
    border: 1px solid var(--silver);
    border-top: none;
  }
  .sheet-wrap .tbl { margin-bottom: 0; }
  .sheet-wrap .tbl th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: linear-gradient(180deg, var(--slate-lt) 0%, var(--slate) 100%);
    color: #fff;
    border-color: var(--slate-dk);
    font-size: 12px;
    text-shadow: 0 1px 1px rgba(0,0,0,0.3);
  }
  .sheet-wrap .tbl td {
    font-family: "Courier New", Courier, monospace;
    font-size: 13px;
    padding: 3px 8px;
    white-space: nowrap;
  }
  .sep-row td {
    text-align: center !important;
    color: #888;
    font-style: italic;
    background: var(--panel) !important;
    font-family: Tahoma, Verdana, sans-serif !important;
    font-size: 12px !important;
  }
  .sheet-note { font-size: 12px; color: #888; margin: 5px 0 0; }

  /* -- Footer -- */
  .footer-bar {
    border-top: 1px solid var(--silver);
    margin-top: 20px;
    padding: 10px 0;
    text-align: center;
    font-size: 11px;
    color: #999;
  }

  /* -- Misc Bootstrap overrides -- */
  .card { display: none; }
  code { font-family: "Courier New", Courier, monospace; font-size: 14px; color: var(--slate-dk); background: none; }
  .spinner-border { width: 16px; height: 16px; border-width: 2px; }
</style>
</head>
<body>

<div class="site-header">
  <div class="inner">
    <h1>Bedrock Fund</h1>
    <span class="tagline">Portfolio Analyzer - Mean-Variance Optimization Engine</span>
  </div>
</div>
<div class="header-accent"></div>

<div class="main-wrap">
  {% block content %}{% endblock %}

  <div class="footer-bar">
    Bedrock Fund Portfolio Analyzer - EC310R Financial Economic Theory - Wilfrid Laurier University
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
